name: chromium-headful-image

on:
  workflow_call:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/chromium-headful
  UBUNTU_VERSION: "24.04"
  CHROMIUM_SNAP_CHANNEL: stable
  CHROMIUM_SNAP_REVISION: "3482"

jobs:
  docker:
    name: Docker ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          {
            echo "short_sha=${short_sha}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:ubuntu24-${{ matrix.arch }}-${short_sha}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${IMAGE_NAME}:ubuntu24-${{ matrix.arch }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/chromium-headful/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=ubuntu24-${{ steps.vars.outputs.short_sha }}
          build-args: |
            UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
            CHROMIUM_SNAP_CHANNEL=${{ env.CHROMIUM_SNAP_CHANNEL }}
            CHROMIUM_SNAP_REVISION=${{ env.CHROMIUM_SNAP_REVISION }}
          cache-from: type=gha,scope=chromium-headful-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=chromium-headful-${{ matrix.arch }}

  manifest:
    name: Docker manifest
    runs-on: ubuntu-24.04
    needs: docker
    permissions:
      contents: read
      packages: write
    steps:
      - name: Compute tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          {
            echo "short_sha=${short_sha}"
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:ubuntu24-${short_sha}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${IMAGE_NAME}:ubuntu24"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail

          args=()
          while IFS= read -r tag; do
            args+=(--tag "$tag")
          done <<< "${MANIFEST_TAGS}"

          docker buildx imagetools create \
            "${args[@]}" \
            "${IMAGE_NAME}:ubuntu24-amd64-${SHORT_SHA}" \
            "${IMAGE_NAME}:ubuntu24-arm64-${SHORT_SHA}"

          docker buildx imagetools inspect "${IMAGE_NAME}:ubuntu24-${SHORT_SHA}"
        env:
          MANIFEST_TAGS: ${{ steps.vars.outputs.tags }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
