          description: Number of CDP messages relayed across the connection in either direction.
        reason:
          type: string
          description: >
            Why the connection ended. `client_close`: the client initiated the close.
            `upstream_changed`: Chromium restarted mid-session and the proxy tore down
            so the client could reconnect against the new upstream. `upstream_error`:
            upstream dial or message pump errored. `context_cancelled`: the request
            context was cancelled (typically server shutdown).
          enum:
            - client_close
            - upstream_changed
            - upstream_error
            - context_cancelled
    BrowserCdpDisconnectEvent:
      type: object
      description: An external client disconnected from the CDP WebSocket proxy on this VM. Pair with the immediately preceding `cdp_connect` on the same stream.
      required: [ts, type, category, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: cdp_disconnect
        category:
          type: string
          const: system
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserCdpDisconnectEventData"
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserLiveViewConnectEventData:
      type: object
      description: Per-session payload for `live_view_connect` events.
      additionalProperties: false
      required: [session_id]
      properties:
        session_id:
          type: string
          description: Live view session identifier. Stable across reconnects, so a transient network blip can emit two events with the same `session_id`.
    BrowserLiveViewConnectEvent:
      type: object
      description: A live view client connected to the headful browser's WebRTC server (Neko). Headful only; not emitted for headless images.
      required: [ts, type, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: live_view_connect
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserLiveViewConnectEventData"
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserLiveViewDisconnectEventData:
      type: object
      description: Per-session payload for `live_view_disconnect` events.
      additionalProperties: false
      required: [session_id, duration_ms]
      properties:
        session_id:
          type: string
          description: Live view session identifier; matches the corresponding `live_view_connect` event.
        duration_ms:
          type: number
          description: Wall-clock duration of the connection in milliseconds.
    BrowserLiveViewDisconnectEvent:
      type: object
      description: A live view client disconnected from the headful browser's WebRTC server (Neko). Pair with `live_view_connect` by `session_id`.
      required: [ts, type, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: live_view_disconnect
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserLiveViewDisconnectEventData"
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserCaptchaSolveResultEventData:
      type: object
      description: Per-attempt payload for `captcha_solve_result` events.
      additionalProperties: false
      required: [captcha_type, status, duration_ms]
      properties:
        captcha_type:
          type: string
          description: >
            Captcha vendor family. Producers normalize provider-specific task
            names into this set: enterprise variants of recaptcha collapse into
            their version bucket (v2 / v3), and anything not covered (e.g.
            DataDome, MtCaptcha, plain OCR) is reported as `other`.
          enum:
            - hcaptcha
            - recaptcha_v2
            - recaptcha_v3
            - turnstile
            - geetest
            - other
        status:
          type: string
          description: >
            Terminal outcome. `success`: solver returned a usable solution.
            `failure`: solver returned an error (see `error_code`).
            `timeout`: solver did not return within the caller's wait budget.
            `abandoned`: caller cancelled or the page navigated away mid-solve.
          enum:
            - success
            - failure
            - timeout
            - abandoned
        duration_ms:
          type: number
          description: Wall-clock duration from solve start to terminal outcome.
        task_id:
          type: string
          description: Solver-assigned identifier. Opaque, useful for support cross-references.
        website_host:
          type: string
          description: Host of the page where the captcha was solved.
        website_path:
          type: string
          description: Path of the page where the captcha was solved. Query string excluded.
        error_code:
          type: string
          description: Solver-specific error code on failure (e.g. `ERROR_CAPTCHA_UNSOLVABLE`). Absent on success.
    BrowserCaptchaSolveResultEvent:
      type: object
      description: A captcha solve attempt reached a terminal outcome.
      required: [ts, type, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: captcha_solve_result
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserCaptchaSolveResultEventData"
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserSystemOomKillEventData:
      type: object
      description: Per-kill payload for `system_oom_kill` events.
      additionalProperties: false
      required: [process_name, pid, rss_kb]
      properties:
        process_name:
          type: string
          description: Comm of the killed process as reported by the kernel (max 15 chars, truncated by the kernel).
        pid:
          type: integer
          description: PID of the killed process.
        rss_kb:
          type: integer
          description: Resident set size of the killed process in KiB (sum of anon-rss, file-rss, and shmem-rss). This is the physical memory the process was using at the time of the kill.
        trigger_process_name:
          type: string
          description: >
            Comm of the process whose allocation request caused the
            kernel to invoke the OOM-killer. Often the same as
            `process_name` (the kernel killed the requester) but can
            differ when the kernel chose a different victim. Max 15
            chars, truncated by the kernel.
        trigger_pid:
          type: integer
          description: >
            PID of the triggering process. Absent if the kernel did
            not emit the standard `CPU: N PID: N Comm:` header line.
        constraint:
          type: string
          description: >
            Why the kernel decided to OOM-kill. `none` means global memory
            exhaustion; `memcg` means a cgroup memory limit was hit;
            `cpuset` / `memory_policy` are NUMA/policy-driven kills.
            Absent on kernels older than 5.0 which did not emit the
            structured `oom-kill:` line.
          enum:
            - none
            - memcg
            - cpuset
            - memory_policy
        mem_total_kb:
          type: integer
          description: >
            Total system memory in KiB at the time of the kill, derived
            from the `N pages RAM` line in the kernel's Mem-Info dump.
            Assumes a 4 KiB page size. Absent if the kernel did not
            emit a parseable Mem-Info section.
        mem_free_kb:
          type: integer
          description: >
            Free system memory in KiB at the time of the kill, derived
            from the `free:N` field in the kernel's Mem-Info dump.
            Assumes a 4 KiB page size. Does not include reclaimable
            caches, so a small value with a large `mem_total_kb` may
            still mean the system was not under hard pressure. Absent
            if the kernel did not emit a parseable Mem-Info section.
        top_tasks:
          type: array
          maxItems: 5
          description: >
            Top processes by resident-set-size at the moment of the
            kill, sorted descending. Sourced from the kernel's
            `Tasks state` table. Empty if the kernel did not emit the
            table. Capped at 5 entries to bound payload size.
          items:
            $ref: "#/components/schemas/BrowserSystemOomKillTask"
    BrowserSystemOomKillTask:
      type: object
      description: A single process entry from the kernel's `Tasks state` dump.
      additionalProperties: false
      required: [pid, name, rss_kb]
      properties:
        pid:
          type: integer
          description: PID of the process.
        name:
          type: string
          description: Comm of the process (max 15 chars, truncated by the kernel).
        rss_kb:
          type: integer
          description: Resident set size in KiB at the moment of the kill.
    BrowserSystemOomKillEvent:
      type: object
      description: >
        The Linux kernel OOM-killer terminated a process inside the VM. Sourced from
        `/dev/kmsg`. Fires for any process killed by the kernel due to memory
        exhaustion, including Chrome renderer subprocesses that are not supervised.
      required: [ts, type, category, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: system_oom_kill
        category:
          type: string
          const: system
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserSystemOomKillEventData"
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserServiceCrashedEventData:
      type: object
      description: >
        Per-crash payload for `service_crashed` events. Exit code and
        signal are not exposed by the underlying process manager on this
        channel, so only the service identity, the lifecycle phase the
        crash occurred in, and (when available) the PID are reported.
      additionalProperties: false
      required: [service_name, phase]
      properties:
        service_name:
          type: string
          description: Program name of the crashed service (e.g. `chromium`, `mutter`, `kernel-images-api`).
        pid:
          type: integer
          description: PID of the crashed process. Absent when the process manager gave up after exhausting restart attempts and is no longer tracking a live PID.
        phase:
          type: string
          description: >
            Lifecycle phase the crash occurred in.
            `startup` means the process died before it ever reached a
            healthy running state. `running` means a previously healthy
            process died unexpectedly. `gave_up` means the process
            manager exhausted its restart attempts and stopped trying;
            no further `service_crashed` events will fire for this
            service until something restarts it.
          enum:
            - startup
            - running
            - gave_up
    BrowserServiceCrashedEvent:
      type: object
      description: >
        A managed service exited unexpectedly. Intentional stops (e.g.
        operator-initiated shutdown) do not produce this event — only
        unexpected exits and terminal restart-give-up transitions do.
      required: [ts, type, category, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: service_crashed
        category:
          type: string
          const: system
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserServiceCrashedEventData"
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    KnownBrowserTelemetryEvent:
      description: >
        Discriminated union of browser telemetry events emitted by the Kernel
        image. This is a structural taxonomy: any event on the telemetry stream
        whose `data` conforms to one of the variants below (selected by `type`)
        is a `KnownBrowserTelemetryEvent`, regardless of who published it.
        Caller-published events via POST /telemetry/events are not constrained
        to this union; see `TelemetryEvent` for the wire shape. Validation of
        caller payloads against this taxonomy is the consumer's responsibility.
      oneOf:
        - $ref: "#/components/schemas/BrowserConsoleLogEvent"
        - $ref: "#/components/schemas/BrowserConsoleErrorEvent"
        - $ref: "#/components/schemas/BrowserNetworkRequestEvent"
        - $ref: "#/components/schemas/BrowserNetworkResponseEvent"
        - $ref: "#/components/schemas/BrowserNetworkLoadingFailedEvent"
        - $ref: "#/components/schemas/BrowserNetworkIdleEvent"
        - $ref: "#/components/schemas/BrowserPageNavigationEvent"
        - $ref: "#/components/schemas/BrowserPageDomContentLoadedEvent"
        - $ref: "#/components/schemas/BrowserPageLoadEvent"
        - $ref: "#/components/schemas/BrowserPageTabOpenedEvent"
        - $ref: "#/components/schemas/BrowserPageLayoutShiftEvent"
        - $ref: "#/components/schemas/BrowserPageLcpEvent"
        - $ref: "#/components/schemas/BrowserPageLayoutSettledEvent"
        - $ref: "#/components/schemas/BrowserPageNavigationSettledEvent"
        - $ref: "#/components/schemas/BrowserInteractionClickEvent"
        - $ref: "#/components/schemas/BrowserInteractionKeyEvent"
        - $ref: "#/components/schemas/BrowserInteractionScrollSettledEvent"
        - $ref: "#/components/schemas/BrowserMonitorScreenshotEvent"
        - $ref: "#/components/schemas/BrowserMonitorDisconnectedEvent"
        - $ref: "#/components/schemas/BrowserMonitorReconnectedEvent"
        - $ref: "#/components/schemas/BrowserMonitorReconnectFailedEvent"
        - $ref: "#/components/schemas/BrowserMonitorInitFailedEvent"
        - $ref: "#/components/schemas/BrowserApiCallEvent"
        - $ref: "#/components/schemas/BrowserCdpConnectEvent"
        - $ref: "#/components/schemas/BrowserCdpDisconnectEvent"
        - $ref: "#/components/schemas/BrowserLiveViewConnectEvent"
        - $ref: "#/components/schemas/BrowserLiveViewDisconnectEvent"
        - $ref: "#/components/schemas/BrowserCaptchaSolveResultEvent"
        - $ref: "#/components/schemas/BrowserSystemOomKillEvent"
        - $ref: "#/components/schemas/BrowserServiceCrashedEvent"
      discriminator:
        propertyName: type
        mapping:
          console_log: "#/components/schemas/BrowserConsoleLogEvent"
          console_error: "#/components/schemas/BrowserConsoleErrorEvent"
          network_request: "#/components/schemas/BrowserNetworkRequestEvent"
          network_response: "#/components/schemas/BrowserNetworkResponseEvent"
          network_loading_failed: "#/components/schemas/BrowserNetworkLoadingFailedEvent"
          network_idle: "#/components/schemas/BrowserNetworkIdleEvent"
          page_navigation: "#/components/schemas/BrowserPageNavigationEvent"
          page_dom_content_loaded: "#/components/schemas/BrowserPageDomContentLoadedEvent"
          page_load: "#/components/schemas/BrowserPageLoadEvent"
          page_tab_opened: "#/components/schemas/BrowserPageTabOpenedEvent"
          page_layout_shift: "#/components/schemas/BrowserPageLayoutShiftEvent"
          page_lcp: "#/components/schemas/BrowserPageLcpEvent"
          page_layout_settled: "#/components/schemas/BrowserPageLayoutSettledEvent"
          page_navigation_settled: "#/components/schemas/BrowserPageNavigationSettledEvent"
          interaction_click: "#/components/schemas/BrowserInteractionClickEvent"
          interaction_key: "#/components/schemas/BrowserInteractionKeyEvent"
          interaction_scroll_settled: "#/components/schemas/BrowserInteractionScrollSettledEvent"
          monitor_screenshot: "#/components/schemas/BrowserMonitorScreenshotEvent"
          monitor_disconnected: "#/components/schemas/BrowserMonitorDisconnectedEvent"
          monitor_reconnected: "#/components/schemas/BrowserMonitorReconnectedEvent"
          monitor_reconnect_failed: "#/components/schemas/BrowserMonitorReconnectFailedEvent"
          monitor_init_failed: "#/components/schemas/BrowserMonitorInitFailedEvent"
          api_call: "#/components/schemas/BrowserApiCallEvent"
          cdp_connect: "#/components/schemas/BrowserCdpConnectEvent"
          cdp_disconnect: "#/components/schemas/BrowserCdpDisconnectEvent"
          live_view_connect: "#/components/schemas/BrowserLiveViewConnectEvent"
          live_view_disconnect: "#/components/schemas/BrowserLiveViewDisconnectEvent"
          captcha_solve_result: "#/components/schemas/BrowserCaptchaSolveResultEvent"
          system_oom_kill: "#/components/schemas/BrowserSystemOomKillEvent"
          service_crashed: "#/components/schemas/BrowserServiceCrashedEvent"
    TelemetryState:
      type: object
      description: Current telemetry configuration.
      required:
        - config
        - seq
      properties:
        config:
          $ref: "#/components/schemas/BrowserTelemetryConfig"
        seq:
          type: integer
          format: int64
          description: >-
            Process-monotonic sequence number of the last published event.
            Does not reset across configuration changes.
          minimum: 0
        applied_at:
          type: string
          format: date-time
          description: >-
            Wall-clock time at which the current configuration was applied.
            Omitted when telemetry is not configured.
      additionalProperties: false
    StartRecordingRequest:
      type: object
      properties:
        maxFileSizeInMB:
          type: integer
          description: Maximum file size in MB (overrides server default)
          minimum: 10
          maximum: 10000
        framerate:
          type: integer
          description: Recording framerate in fps (overrides server default)
          minimum: 1
          maximum: 20
        maxDurationInSeconds:
          type: integer
          description: Maximum recording duration in seconds (overrides server default)
          minimum: 1
        id:
          type: string
          description: Optional identifier for the recording session. Alphanumeric or hyphen.
          pattern: "^[a-zA-Z0-9-]+$"
      additionalProperties: false
    StopRecordingRequest:
      type: object
      properties:
        forceStop:
          type: boolean
          description: Immediately stop without graceful shutdown. This may result in a corrupted video file.
          default: false
        id:
          type: string
          description: Identifier of the recorder to stop. Alphanumeric or hyphen.
          pattern: "^[a-zA-Z0-9-]+$"
      additionalProperties: false
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ChromiumConfigureError:
