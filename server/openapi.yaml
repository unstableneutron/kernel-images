      required: [phase, message]
      additionalProperties: false
      properties:
        phase:
          type: string
          enum:
            - configure_phase
            - navigate_phase
          description: configure_phase maps to restart/filesystem/policy/extension/profile/display work; navigate_phase is retained for compatibility.
        message:
          type: string
        step:
          type: string
          description: Optional configure step that failed.
          enum:
            - stop_chromium
            - start_chromium
            - chrome_policies
            - extensions
            - display
            - chromium_flags
            - profile
    RecorderInfo:
      type: object
      required: [id, isRecording]
      properties:
        id:
          type: string
        isRecording:
          type: boolean
        started_at:
          type: [string, "null"]
          format: date-time
          description: Timestamp when recording started
        finished_at:
          type: [string, "null"]
          format: date-time
          description: Timestamp when recording finished
    ClickMouseRequest:
      type: object
      required:
        - x
        - y
      properties:
        button:
          type: string
          description: Mouse button to interact with
          enum: [left, right, middle, back, forward]
        click_type:
          type: string
          description: Type of click action
          enum: [down, up, click]
        x:
          type: integer
          description: X coordinate of the click position
        y:
          type: integer
          description: Y coordinate of the click position
        hold_keys:
          type: array
          description: Modifier keys to hold during the click
          items:
            type: string
        num_clicks:
          type: integer
          description: Number of times to repeat the click
          default: 1
      additionalProperties: false
    MoveMouseRequest:
      type: object
      required:
        - x
        - y
      properties:
        x:
          type: integer
          description: X coordinate to move the cursor to
        y:
          type: integer
          description: Y coordinate to move the cursor to
        hold_keys:
          type: array
          description: Modifier keys to hold during the move
          items:
            type: string
        smooth:
          type: boolean
          description: Use human-like Bezier curve path instead of instant mouse movement.
          default: true
        duration_ms:
          type: integer
          description: Target total duration in milliseconds for the mouse movement when smooth=true. Omit for automatic timing based on distance.
          minimum: 50
          maximum: 5000
      additionalProperties: false
    ScreenshotRegion:
      type: object
      required:
        - x
        - y
        - width
        - height
      properties:
        x:
          type: integer
          description: X coordinate of the region's top-left corner
        y:
          type: integer
          description: Y coordinate of the region's top-left corner
        width:
          type: integer
          description: Width of the region in pixels
        height:
          type: integer
          description: Height of the region in pixels
      additionalProperties: false
    ScreenshotRequest:
      type: object
      properties:
        region:
          $ref: "#/components/schemas/ScreenshotRegion"
      additionalProperties: false
    SetCursorRequest:
      type: object
      required:
        - hidden
      properties:
        hidden:
          type: boolean
          description: Whether the cursor should be hidden
      additionalProperties: false
    MousePositionResponse:
      type: object
      required:
        - x
        - y
      properties:
        x:
          type: integer
          description: X coordinate of the cursor
        y:
          type: integer
          description: Y coordinate of the cursor
    TypeTextRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Text to type on the host computer
        delay:
          type: integer
          description: Delay in milliseconds between keystrokes. Ignored when smooth is true.
          minimum: 0
          default: 0
        smooth:
          type: boolean
          description: |
            Use human-like variable keystroke timing instead of a fixed delay.
            Defaults to true (same as moveMouse/dragMouse). Set to false for
            xdotool typing with an optional fixed delay between keys (delay=0 is instant).
            When true, text is typed in word-sized chunks with variable intra-word delays
            and natural inter-word pauses. The delay field is ignored when smooth is true.
          default: true
        typo_chance:
          type: number
          description: |
            Per-character typo injection rate; mistakes are corrected with backspace.
            Default 0. Only applies when smooth is true (silently ignored when
            smooth is false).
          minimum: 0
          maximum: 0.10
          default: 0
      additionalProperties: false
    ClipboardContent:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Current clipboard text content
      additionalProperties: false
    WriteClipboardRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Text to write to the system clipboard
      additionalProperties: false
    PressKeyRequest:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          description: |
            List of key symbols to press. Each item should be a key symbol supported by xdotool
            (see X11 keysym definitions). Examples include "Return", "Shift", "Ctrl", "Alt", "F5".
            Items in this list could also be combinations, e.g. "Ctrl+t" or "Ctrl+Shift+Tab".
          items:
            type: string
        duration:
          type: integer
          description: Duration to hold the keys down in milliseconds. If omitted or 0, keys are tapped.
          minimum: 0
          default: 0
        hold_keys:
          type: array
          description: Optional modifier keys to hold during the key press sequence.
          items:
            type: string
      additionalProperties: false
    ScrollRequest:
      type: object
      required:
        - x
        - y
      properties:
        x:
          type: integer
          description: X coordinate at which to perform the scroll
        y:
          type: integer
          description: Y coordinate at which to perform the scroll
        delta_x:
          type: integer
          description: Horizontal scroll amount. Positive scrolls right, negative scrolls left.
          default: 0
        delta_y:
          type: integer
          description: Vertical scroll amount. Positive scrolls down, negative scrolls up.
          default: 0
        hold_keys:
          type: array
          description: Modifier keys to hold during the scroll
          items:
            type: string
      additionalProperties: false
    DragMouseRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: array
          description: Ordered list of [x, y] coordinate pairs to move through while dragging. Must contain at least 2 points.
          minItems: 2
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: integer
        button:
          type: string
          description: Mouse button to drag with
          enum: [left, middle, right]
        delay:
          type: integer
          description: Delay in milliseconds between button down and starting to move along the path.
          minimum: 0
          default: 0
        steps_per_segment:
          type: integer
          description: Number of relative move steps per segment in the path. Ignored when smooth=true. Minimum 1.
          minimum: 1
          default: 10
        step_delay_ms:
          type: integer
          description: Delay in milliseconds between relative steps while dragging. Ignored when smooth=true.
          minimum: 0
          default: 50
        smooth:
          type: boolean
          description: Use human-like Bezier curves between path waypoints instead of linear interpolation. When true, steps_per_segment and step_delay_ms are ignored.
          default: true
        duration_ms:
          type: integer
          description: Target total duration in milliseconds for the entire drag movement when smooth=true. Omit for automatic timing based on total path length.
          minimum: 50
          maximum: 10000
        hold_keys:
          type: array
          description: Modifier keys to hold during the drag
          items:
            type: string
      additionalProperties: false
    StartFsWatchRequest:
