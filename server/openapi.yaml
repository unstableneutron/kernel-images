openapi: 3.1.0
info:
  title: Kernel Images API
  version: 0.1.0
paths:
  /recording/start:
    post:
      summary: Start a screen recording. Only one recording per ID can be registered at a time.
      operationId: startRecording
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRecordingRequest"
      responses:
        "201":
          description: Recording started
        "400":
          $ref: "#/components/responses/BadRequestError"
        "409":
          description: A recording is already in progress
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"
  /process/exec:
    post:
      summary: Execute a command synchronously
      operationId: processExec
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessExecRequest"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessExecResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /process/spawn:
    post:
      summary: Execute a command asynchronously
      operationId: processSpawn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessSpawnRequest"
      responses:
        "200":
          description: Spawned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessSpawnResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /process/{process_id}/status:
    get:
      summary: Get process status
      operationId: processStatus
      parameters:
        - name: process_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessStatus"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /process/{process_id}/stdout/stream:
    get:
      summary: Stream process stdout over SSE
      operationId: processStdoutStream
      parameters:
        - name: process_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SSE stream of process output and lifecycle events
          headers:
            X-SSE-Content-Type:
              description: Media type of SSE data events (application/json)
              schema:
                type: string
                const: application/json
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ProcessStreamEvent"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /process/{process_id}/stdin:
    post:
      summary: Write to process stdin
      operationId: processStdin
      parameters:
        - name: process_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessStdinRequest"
      responses:
        "200":
          description: Bytes written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessStdinResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /process/{process_id}/kill:
    post:
      summary: Send signal to process
      operationId: processKill
      parameters:
        - name: process_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessKillRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /process/{process_id}/resize:
    post:
      summary: Resize a PTY-backed process
      operationId: processResize
      parameters:
        - name: process_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessResizeRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /recording/stop:
    post:
      summary: Stop the recording
      operationId: stopRecording
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopRecordingRequest"
      responses:
        "200":
          description: Recording stopped
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /recording/download:
    get:
      summary: Download the most recently recorded video file
      parameters:
        - name: id
          in: query
          description: Optional recorder identifier. When omitted, the server uses the default recorder.
          schema:
            type: string
            pattern: "^[a-zA-Z0-9-]+$"
      operationId: downloadRecording
      responses:
        "200":
          description: Recording file
          headers:
            # Note: using a `format: date-time` here doesn't work as intended as the generated code
            # calls a `fmt.Sprint` on the value when setting the header. time.String is a
            # non-standard format that most parses will barf on, making everyone's life harder, so
            # we're skipping the `format` in favor of an explicit description.
            X-Recording-Started-At:
              description: Timestamp of when the recording started. Guaranteed to be RFC3339.
              schema:
                type: string
            X-Recording-Finished-At:
              description: Timestamp of when the recording finished. Guaranteed to be RFC3339.
              schema:
                type: string
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "202":
          description: Recording is still in progress, please try again later
          headers:
            Retry-After:
              description: Suggested wait time in seconds before retrying
              schema:
                type: integer
                minimum: 1
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /recording/list:
    get:
      summary: List all recorders
      operationId: listRecorders
      responses:
        "200":
          description: List of recorders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecorderInfo"
        "500":
          $ref: "#/components/responses/InternalError"
  /recording/delete:
    post:
      summary: Delete a previously recorded video file
      operationId: deleteRecording
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRecordingRequest"
      responses:
        "200":
          description: Recording deleted
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/click_mouse:
    post:
      summary: Simulate a mouse click action on the host computer
      operationId: clickMouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClickMouseRequest"
      responses:
        "200":
          description: Mouse action performed
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/move_mouse:
    post:
      summary: Move the mouse cursor to the specified coordinates on the host computer
      operationId: moveMouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveMouseRequest"
      responses:
        "200":
          description: Mouse cursor moved
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/screenshot:
    post:
      summary: Capture a screenshot of the host computer
      operationId: takeScreenshot
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreenshotRequest"
      responses:
        "200":
          description: Screenshot image
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/cursor:
    post:
      summary: Hide or show the cursor
      operationId: setCursor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCursorRequest"
      responses:
        "200":
          description: Cursor visibility updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/get_mouse_position:
    post:
      summary: Get the current mouse cursor position on the host computer
      operationId: getMousePosition
      responses:
        "200":
          description: Current mouse position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MousePositionResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/type:
    post:
      summary: Type text on the host computer
      operationId: typeText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TypeTextRequest"
      responses:
        "200":
          description: Text typed successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/press_key:
    post:
      summary: Press one or more keys on the host computer
      description: |
        Presses the specified keys for an optional duration. Keys should be key symbols
        supported by xdotool. For a comprehensive list of key symbols, see
        the X11 keysym definitions at https://cgit.freedesktop.org/xorg/proto/x11proto/plain/keysymdef.h
        The server honors millisecond-level durations using fractional sleeps under the hood.
      operationId: pressKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PressKeyRequest"
      responses:
        "200":
          description: Keys pressed successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/scroll:
    post:
      summary: Scroll the mouse wheel at a position on the host computer
      description: |
        Scroll vertically and/or horizontally at the given coordinates, optionally while holding modifier keys.
        The scroll amounts are in logical ticks (not pixels) and application behavior may vary; tuning may be required.
        When both horizontal and vertical deltas are provided, the server applies them sequentially (vertical then horizontal)
        and batches wheel events using `xdotool click --repeat N --delay 0 <button>`.
      operationId: scroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScrollRequest"
      responses:
        "200":
          description: Scroll performed
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/drag_mouse:
    post:
      summary: Drag the mouse along a path
      description: |
        Press and hold a mouse button, optionally wait for a short delay, then move along the given path and release.
        The path is a list of [x, y] coordinate pairs.
      operationId: dragMouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DragMouseRequest"
      responses:
        "200":
          description: Drag performed
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/batch:
    post:
      summary: Execute a batch of computer actions sequentially
      description: |
        Execute an ordered list of computer actions in a single API call. Actions are performed
        sequentially while holding an exclusive lock, so no other input operations can interleave.
        Execution stops on the first error and the response indicates which action failed.
        This is useful for chaining deterministic sequences of mouse and keyboard actions
        without paying network round-trip latency for each individual action.
      operationId: batchComputerAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchComputerActionRequest"
      responses:
        "200":
          description: Batch executed successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/clipboard/read:
    post:
      summary: Read text from the system clipboard
      operationId: readClipboard
      responses:
        "200":
          description: Clipboard content read successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClipboardContent"
        "500":
          $ref: "#/components/responses/InternalError"
  /computer/clipboard/write:
    post:
      summary: Write text to the system clipboard
      operationId: writeClipboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WriteClipboardRequest"
      responses:
        "200":
          description: Text written to clipboard successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /logs/stream:
    get:
      summary: Stream logs over SSE
      operationId: logsStream
      parameters:
        - in: query
          name: source
          required: true
          schema:
            type: string
            enum: [path, supervisor]
        - in: query
          name: follow
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          description: only required if source is path
          name: path
          required: false
          schema:
            type: string
        - in: query
          name: supervisor_process
          description: only required if source is supervisor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of logs
          headers:
            X-SSE-Content-Type:
              description: Media type of SSE data events (application/json)
              schema:
                type: string
                const: application/json
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/LogEvent"
  # File system operations
  /fs/read_file:
    get:
      summary: Read file contents
      operationId: readFile
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^/.*"
          description: Absolute file path to read.
      responses:
        "200":
          description: File read successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/download_dir_zip:
    get:
      summary: Download a directory as a ZIP archive
      description: Returns a ZIP file containing the contents of the specified directory.
      operationId: downloadDirZip
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^/.*"
          description: Absolute directory path to archive and download.
      responses:
        "200":
          description: ZIP archive of the requested directory
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/write_file:
    put:
      summary: Write or create a file
      operationId: writeFile
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^/.*"
          description: Destination absolute file path.
        - name: mode
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-7]{3,4}$"
          description: Optional file mode (octal string, e.g. 644). Defaults to 644.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: File written successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/upload:
    post:
      summary: Upload one or more files
      description: Allows uploading single or multiple files to the remote filesystem.
      operationId: uploadFiles
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: object
                    properties:
                      file:
                        type: string
                        format: binary
                      dest_path:
                        type: string
                        description: Absolute destination path to write the file.
                        pattern: "^/.*"
                    required: [file, dest_path]
              required: [files]
      responses:
        "201":
          description: Files uploaded successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/upload_zip:
    post:
      summary: Upload a zip archive and extract it
      description: Upload a zip file and extract its contents to the specified destination path.
      operationId: uploadZip
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                zip_file:
                  type: string
                  format: binary
                dest_path:
                  type: string
                  description: Absolute destination directory to extract the archive to.
                  pattern: "^/.*"
              required: [zip_file, dest_path]
      responses:
        "201":
          description: Zip uploaded and extracted successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/download_dir_zstd:
    get:
      summary: Download a directory as a tar.zst archive
      description: |
        Returns a tar.zst (tar archive compressed with zstd) file containing the contents
        of the specified directory. Zstd offers significantly faster compression and
        decompression compared to zip while achieving better compression ratios.
      operationId: downloadDirZstd
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^/.*"
          description: Absolute directory path to archive and download.
        - name: compression_level
          in: query
          required: false
          schema:
            type: string
            enum: [fastest, default, better, best]
            default: default
          description: |
            Compression level. Higher levels produce smaller archives but take longer.
            - fastest: ~zstd level 1, maximum speed (~300-500 MB/s)
            - default: ~zstd level 3, balanced speed/ratio (~150 MB/s)
            - better: ~zstd level 7, better ratio (~50-80 MB/s)
            - best: ~zstd level 11, best ratio (~20-40 MB/s)
      responses:
        "200":
          description: Tar.zst archive of the requested directory
          content:
            application/zstd:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/upload_zstd:
    post:
      summary: Upload a tar.zst archive and extract it
      description: |
        Upload a tar.zst (tar archive compressed with zstd) file and extract its contents
        to the specified destination path. Zstd offers significantly faster decompression
        compared to zip.
      operationId: uploadZstd
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                archive:
                  type: string
                  format: binary
                  description: The tar.zst archive file.
                dest_path:
                  type: string
                  description: Absolute destination directory to extract the archive to.
                  pattern: "^/.*"
                strip_components:
                  type: integer
                  minimum: 0
                  default: 0
                  description: Number of leading path components to strip during extraction (like tar --strip-components).
              required: [archive, dest_path]
      responses:
        "201":
          description: Archive uploaded and extracted successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/list_files:
    get:
      summary: List files in a directory
      operationId: listFiles
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^/.*"
          description: Absolute directory path.
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFiles"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/create_directory:
    put:
      summary: Create a new directory
      operationId: createDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDirectoryRequest"
      responses:
        "201":
          description: Directory created successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/delete_file:
    put:
      summary: Delete a file
      operationId: deleteFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePathRequest"
      responses:
        "200":
          description: File deleted
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/delete_directory:
    put:
      summary: Delete a directory
      operationId: deleteDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePathRequest"
      responses:
        "200":
          description: Directory deleted
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/set_file_permissions:
    put:
      summary: Set file or directory permissions/ownership
      operationId: setFilePermissions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFilePermissionsRequest"
      responses:
        "200":
          description: Permissions updated
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/file_info:
    get:
      summary: Get information about a file or directory
      operationId: fileInfo
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
            pattern: "^/.*"
          description: Absolute path of the file or directory.
      responses:
        "200":
          description: File information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/move:
    put:
      summary: Move or rename a file or directory
      operationId: movePath
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovePathRequest"
      responses:
        "200":
          description: Move successful
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/watch:
    post:
      summary: Watch a directory for changes
      operationId: startFsWatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartFsWatchRequest"
      responses:
        "201":
          description: Watch started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  watch_id:
                    type: string
                    description: Unique identifier for the directory watch
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/watch/{watch_id}/events:
    get:
      summary: Stream filesystem events for a watch
      operationId: streamFsEvents
      parameters:
        - name: watch_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSE stream of filesystem events
          headers:
            X-SSE-Content-Type:
              description: Media type of SSE data events (application/json)
              schema:
                type: string
                const: application/json
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/FileSystemEvent"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"

  /fs/watch/{watch_id}:
    delete:
      summary: Stop watching a directory
      operationId: stopFsWatch
      parameters:
        - name: watch_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Watch stopped successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalError"
  /display:
    patch:
      summary: Update display configuration
      operationId: patchDisplay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchDisplayRequest"
      responses:
        "200":
          description: Updated display configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisplayConfig"
        "409":
          $ref: "#/components/responses/ConflictError"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"

  /chromium/upload-extensions-and-restart:
    post:
      summary: Upload one or more unpacked extensions (as zips) and restart Chromium
      description: |
        Upload one or more extension zip archives, extract them under /home/kernel/extensions/<name>,
        set runtime extension flags in /chromium/flags, restart Chromium via supervisord, and wait
        until the Chromium DevTools "listening" log line is observed before returning success.
      operationId: uploadExtensionsAndRestart
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                extensions:
                  type: array
                  description: List of extensions to upload and activate
                  items:
                    type: object
                    properties:
                      zip_file:
                        type: string
                        format: binary
                        description: Zip archive containing an unpacked Chromium extension (must include manifest.json)
                      name:
                        type: string
                        description: Folder name to place the extension under /home/kernel/extensions/<name>
                        pattern: "^[A-Za-z0-9._-]{1,255}$"
                    required: [zip_file, name]
              required: [extensions]
      responses:
        "201":
          description: Extensions uploaded, Chromium restarted, and DevTools is ready
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"

  /chromium/policies:
    patch:
      summary: Update Chromium enterprise policies and restart
      description: |
        Merge user-provided Chromium enterprise policy overrides into the base policy.json,
        restart Chromium via supervisord, and wait until the Chromium DevTools "listening"
        log line is observed before returning success.
        Certain policies managed by kernel infrastructure (e.g. ExtensionSettings,
        proxy-related policies, and policies required for CDP/automation) are blocked
        from override.
      operationId: patchChromiumPolicies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Chromium enterprise policy overrides. Keys are policy names
                (e.g. "DefaultCookiesSetting") and values are the policy values.
                See https://chromeenterprise.google/policies/ for available policies.
              additionalProperties: true
              example:
                DefaultCookiesSetting: 1
                BasicAuthOverHttpEnabled: true
                HttpsUpgradesEnabled: false
                MaxConnectionsPerProxy: 32
                PopupsAllowedForUrls:
                  - "https://example.com"
      responses:
        "200":
          description: Policies updated and Chromium restarted successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"

  /chromium/flags:
    patch:
      summary: Update Chromium launch flags and restart
      description: |
        Merge new flags with existing ones, update /chromium/flags, restart Chromium via supervisord,
        and wait until the Chromium DevTools "listening" log line is observed before returning success.
      operationId: patchChromiumFlags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flags:
                  type: array
                  items:
                    type: string
                  description: Chromium flags to merge (e.g., ["--kiosk", "--disable-gpu"])
              required: [flags]
      responses:
        "200":
          description: Flags updated and Chromium restarted successfully
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"

  /configure:
    post:
      summary: Apply batched session and browser configuration plus optional navigation
      description: |
        Optional multipart parts apply configuration while Chromium stays stopped once (policy,
        flags, extensions, profile archive, optional display sizing), then Chromium is started exactly
        once and DevTools readiness is awaited. Optional `start_url` dispatches a best-effort
        navigation after readiness without waiting for page load. Bare hosts are normalized to
        `https://`. Omit any part you do not need. At least one actionable part must be present.
        Required configuration steps run in this order: policies, extensions, display, flags,
        then profile archive. Chromium is started only once at the end. The endpoint is not
        transactional: if a later required step fails, earlier successful side effects may remain
        on the instance while the non-2xx error propagates.
        Prefer this over separate `/chromium/*` and `/display` calls when multiple restart-triggering
        steps apply in one session configure.
      operationId: chromiumConfigure
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                display:
                  description: >-
                    UTF-8 JSON object matching `#/components/schemas/PatchDisplayRequest` (width/height/etc.).
                    When combined with restart-triggering fields, the resize is applied while Chromium
                    is stopped and Chromium is started once at the end.
                  type: string
                chromium_flags:
                  description: >-
                    UTF-8 JSON object `{"flags":["--kiosk"]}` — same semantics as PATCH /chromium/flags.
                  type: string
                chrome_policies:
                  description: UTF-8 JSON policy override map — same semantics as PATCH /chromium/policies.
                  type: string
                profile_archive:
                  description: >-
                    tar.zst archive containing the desired `/home/kernel/user-data` profile contents.
                    Prefer archives whose root entries are the profile files/directories themselves
                    (for example `Default/Preferences`). Use `strip_components` only when uploading
                    an archive that includes leading wrapper directories.
                  type: string
                  format: binary
                strip_components:
                  description: Optional number of leading path components to strip from profile_archive entries (non-negative integer as text).
                  type: string
                start_url:
                  description: >-
                    URL text to navigate after configure. Bare hosts are normalized to https://,
                    length is capped at 2048 bytes, and Chrome decides which schemes are navigable.
                  type: string
                extensions:
                  type: array
                  description: Extension zips paired with consecutive extensions.name fields (same as upload-extensions-and-restart).
                  items:
                    type: object
                    properties:
                      zip_file:
                        type: string
                        format: binary
                      name:
                        type: string
                        pattern: "^[A-Za-z0-9._-]{1,255}$"
                    required: [zip_file, name]
      responses:
        "200":
          description: Configuration applied; optional navigate completed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "500":
          description: Configure failure with structured phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChromiumConfigureError"

  /playwright/execute:
    post:
      summary: Execute Playwright/TypeScript code against the browser
      description: |
        Execute arbitrary Playwright code in a fresh execution context against the browser running
        on localhost:9222. The code has access to 'page', 'context', and 'browser' variables.
        The result of the code execution is returned in the response.
      operationId: executePlaywrightCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutePlaywrightRequest"
      responses:
        "200":
          description: Code executed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutePlaywrightResult"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
  /telemetry:
    get:
      summary: Get telemetry configuration
      description: >
        Returns the current telemetry configuration. Returns 404 if telemetry
        is not configured.
      operationId: getTelemetry
      responses:
        "200":
          description: Telemetry configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryState"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      summary: Set telemetry configuration
      description: >
        Sets the telemetry configuration. Returns 201 if telemetry was not
        previously configured; returns 200 if it was. Setting all five categories
        to enabled: false clears the configuration; this is idempotent when
        telemetry is not configured.
      operationId: putTelemetry
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserTelemetryConfig"
      responses:
        "200":
          description: Telemetry configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryState"
        "201":
          description: Telemetry configuration set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryState"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      summary: Update telemetry configuration
      description: >
        Partially updates the telemetry configuration. Only categories explicitly
        set in the request body are changed; omitted categories retain their
        current settings. Returns 404 if telemetry is not configured. Setting
        all five categories to enabled: false clears the configuration.
      operationId: patchTelemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrowserTelemetryConfig"
      responses:
        "200":
          description: Telemetry configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryState"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /telemetry/events:
    post:
      summary: Publish an event into the telemetry stream
      description: >
        Injects an event into the telemetry stream, gated by the active
        telemetry config. Returns 200 with the assigned envelope when the
        event is admitted, 204 when the event is filtered (no active session
        or the event's category is disabled), or 400 on validation failure.
      operationId: publishTelemetryEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishEventRequest"
      responses:
        "200":
          description: Event published; envelope carries the assigned sequence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetryEnvelope"
        "204":
          description: Event accepted but filtered by the active telemetry config; not published.
        "400":
          $ref: "#/components/responses/BadRequestError"
  /telemetry/stream:
    get:
      summary: Stream telemetry events as Server-Sent Events
      description: >
        Opens a live SSE stream of telemetry events.
        Each frame has the form `id: {seq}\ndata: {envelope-json}\n\n`.
        Sequence numbers are process-monotonic and persist across configuration
        changes; a Last-Event-ID from any previous connection is valid for resuming the stream.
        Drops are signaled by gaps in the `id` field: if the received `id` is more
        than 1 ahead of the last-seen `id`, events were evicted from the buffer.
        Clients should track the last-seen `id` to detect gaps.
        Fresh connections with no Last-Event-ID start from the current sequence
        and only see new events.
        The wire shape is the generic `TelemetryEvent`. For browser events
        emitted by the Kernel image (or by callers using a documented `type`),
        the event's `data` conforms to the matching `Browser*EventData`
        schema, selected by `type`.
      operationId: streamTelemetryEvents
      parameters:
        - in: header
          name: Last-Event-ID
          schema:
            type: string
          required: false
          description: >
            Resume after this sequence number. Omit or send 0 to start from
            the current position. Sequence numbers are process-monotonic, so
            any previous value resumes correctly from that point.
      responses:
        "200":
          description: Live SSE stream of telemetry events.
          headers:
            X-SSE-Content-Type:
              description: Media type of SSE data events (application/json)
              schema:
                type: string
                const: application/json
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/TelemetryEnvelope"
  /scaletozero/disable:
    post:
      summary: Idempotently disable scale to zero on this VM.
      description: >
        Prevents the VM from scaling to zero, regardless of HTTP traffic on it.
        Calling the API on this VM will wake it because Unikraft will automatically wake for any request to the VM.
      operationId: disableScaleToZero
      responses:
        "204":
          description: Scale-to-zero disabled
        "500":
          $ref: "#/components/responses/InternalError"
  /scaletozero/enable:
    post:
      summary: Idempotently enable scale to zero on this VM.
      description: >
        Restores normal scale-to-zero behavior on this VM, allowing it to
        scale to zero again when idle. Call this when the VM no longer needs to be held awake.
      operationId: enableScaleToZero
      responses:
        "204":
          description: Scale-to-zero enabled
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    TelemetryEvent:
      type: object
      description: >
        A telemetry event. The wire-level event shape accepted by the publish
        endpoint and emitted on the SSE stream. Arbitrary `type` strings and
        `data` payloads are admitted. For browser events emitted by the Kernel
        image, `data` conforms to the per-type schema documented in the
        `Browser*Event` / `Browser*EventData` definitions, selected by `type`.
      required:
        - type
      properties:
        ts:
          type: integer
          format: int64
          description: Unix timestamp in microseconds. Defaults to the current time when omitted.
        type:
          type: string
          description: Event type identifier.
        category:
          type: string
          description: Event category.
          enum:
            - console
            - network
            - page
            - interaction
            - api
            - system
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          description: >
            Arbitrary JSON payload. For browser events listed in
            `KnownBrowserTelemetryEvent`, the payload conforms to the
            corresponding `Browser*EventData` schema.
        truncated:
          type: boolean
          description: Set by the server when the data field was truncated to fit the size limit.
    BrowserEventSource:
      type: object
      description: Provenance metadata identifying which producer emitted the event.
      required: [kind]
      properties:
        kind:
          type: string
          description: >
            Event producer. `cdp`: Chrome DevTools Protocol events from the
            browser. `kernel_api`: Kernel API server (reserved for
            server-generated events). `extension`: injected Chrome extension.
            `local_process`: system process running alongside the browser.
          enum:
            - cdp
            - kernel_api
            - extension
            - local_process
        event:
          type: string
          description: Producer-specific event name (e.g. `Runtime.consoleAPICalled` for CDP-sourced console events).
        metadata:
          type: object
          description: Producer-specific context (e.g. CDP target/session/frame IDs).
          additionalProperties:
            type: string
      additionalProperties: false
    PublishEventRequest:
      type: object
      description: Request body for publishing an event into the telemetry stream.
      required:
        - type
      properties:
        type:
          type: string
          description: Event type identifier.
        category:
          type: string
          description: Event category.
          enum:
            - console
            - network
            - page
            - interaction
            - api
            - system
          default: system
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          description: Telemetry event payload.
      additionalProperties: false
    TelemetryEnvelope:
      type: object
      description: The envelope assigned to a successfully published event.
      required:
        - seq
        - event
      properties:
        seq:
          type: integer
          format: int64
          minimum: 1
          description: >
            Process-monotonic sequence number assigned across the lifetime of
            the server. Use with Last-Event-ID to resume the SSE stream from
            this point.
        event:
          $ref: "#/components/schemas/TelemetryEvent"
      additionalProperties: false
    BrowserTelemetryConfig:
      type: object
      description: >
        Telemetry configuration for a browser. Per-category capture settings.
        Omit a category or set enabled: true to capture it.
        Set enabled: false to exclude it.
        Omit the browser key entirely to capture all categories.
        Set all five categories to enabled: false to clear the telemetry configuration.
      properties:
        browser:
          $ref: "#/components/schemas/BrowserTelemetryCategoriesConfig"
      additionalProperties: false
    BrowserTelemetryCategoriesConfig:
      type: object
      description: Per-category telemetry capture settings for browser events.
      properties:
        console:
          $ref: "#/components/schemas/BrowserTelemetryCategoryConfig"
          description: Console output (log, warn, error) and uncaught exceptions.
        page:
          $ref: "#/components/schemas/BrowserTelemetryCategoryConfig"
          description: Page lifecycle events (navigation, load, layout shifts, LCP).
        interaction:
          $ref: "#/components/schemas/BrowserTelemetryCategoryConfig"
          description: User interaction events (clicks, keydowns, scroll).
        network:
          $ref: "#/components/schemas/BrowserTelemetryCategoryConfig"
          description: HTTP request/response metadata.
        api:
          $ref: "#/components/schemas/BrowserTelemetryCategoryConfig"
          description: >
            Kernel-image-layer activity that the customer drives: inbound
            API calls to the kernel-images-api server and
            extension-mediated captcha solve attempts. CDP proxy and live
            view session lifecycle events are infrastructure and live in
            the always-on `system` category.
      additionalProperties: false
    BrowserTelemetryCategoryConfig:
      type: object
      description: Configuration for a single telemetry category.
      properties:
        enabled:
          type: boolean
          description: >
            Whether this category is captured. In PUT requests, omitting this field
            defaults to true (category enabled). In PATCH requests, omitting this field
            (or sending an empty object `{}`) is a no-op; the category retains its
            current state. To enable or disable a category via PATCH, you must send
            an explicit `true` or `false`.
      additionalProperties: false
    BrowserCallStack:
      type: object
      description: >
        CDP Runtime.StackTrace representing the JavaScript call stack at the
        time of an event. Fields use CDP naming conventions rather than
        snake_case to match the Chrome DevTools Protocol wire format.
      required: [callFrames]
      properties:
        description:
          type: string
          description: Optional label for the stack trace (e.g. async cause).
        callFrames:
          type: array
          description: Ordered list of call frames, outermost first.
          items:
            type: object
            required: [functionName, scriptId, url, lineNumber, columnNumber]
            properties:
              functionName:
                type: string
                description: JavaScript function name, or empty string for anonymous functions.
              scriptId:
                type: string
                description: CDP script identifier.
              url:
                type: string
                description: URL or name of the script file.
              lineNumber:
                type: integer
                description: Zero-based line number within the script.
              columnNumber:
                type: integer
                description: Zero-based column number within the line.
        parent:
          $ref: "#/components/schemas/BrowserCallStack"
          description: Parent stack trace for async stacks.
    BrowserHttpHeaders:
      type: object
      description: >
        HTTP headers map forwarded as-is from CDP without normalization.
        Values are typically strings but may be any JSON type.
      additionalProperties: true
    BrowserTargetType:
      type: string
      description: CDP target type of the page that produced the event.
      enum: [page, background_page, service_worker, shared_worker, other]
    BrowserEventContext:
      type: object
      description: >
        Browser event context stamped by the browser monitor onto all
        CDP-sourced events. Identifies the target, frame, and navigation epoch
        in which the event occurred.
      required: [session_id, target_id, target_type, nav_seq]
      properties:
        session_id:
          type: string
          description: CDP session identifier for the target connection.
        target_id:
          type: string
          description: Browser target identifier (stable across navigations within a tab).
        target_type:
          $ref: "#/components/schemas/BrowserTargetType"
        frame_id:
          type: string
          description: CDP frame identifier within the target.
        loader_id:
          type: string
          description: CDP document loader identifier, reset on each navigation.
        url:
          type: string
          description: URL relevant to this event; page URL for navigation and page events, request URL for network events.
        nav_seq:
          type: integer
          format: int64
          description: Monotonically increasing navigation sequence number, incremented on each top-level navigation within the target.
    BrowserConsoleLogEventData:
      allOf:
        - $ref: "#/components/schemas/BrowserEventContext"
        - type: object
          required: [level, text]
          properties:
            level:
              type: string
              description: >
                CDP Runtime.consoleAPICalled type, passed through unfiltered
                from Chrome. `error` is routed to console_error events instead;
                all other CDP console types appear here. See CDP spec for the
                full enum.
            text:
              type: string
              description: First console argument coerced to string.
            args:
              type: array
              description: All console arguments coerced to strings.
              items:
                type: string
            stack_trace:
              $ref: "#/components/schemas/BrowserCallStack"
    BrowserConsoleLogEvent:
      type: object
      description: A browser console log event (console.log, console.info, console.warn, etc.).
      required: [ts, type, category, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: console_log
        category:
          type: string
          const: console
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserConsoleLogEventData"
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserConsoleErrorEventData:
      allOf:
        - $ref: "#/components/schemas/BrowserEventContext"
        - type: object
          required: [text]
          properties:
            text:
              type: string
              description: Error message text. Present in both source paths.
            stack_trace:
              $ref: "#/components/schemas/BrowserCallStack"
            level:
              type: string
              description: CDP console type value, always "error". Present only when sourced from Runtime.consoleAPICalled.
            args:
              type: array
              description: All console arguments coerced to strings. Present only when sourced from Runtime.consoleAPICalled.
              items:
                type: string
            line:
              type: integer
              description: Line number in the script where the exception was thrown. Present only when sourced from Runtime.exceptionThrown.
            column:
              type: integer
              description: Column number in the script where the exception was thrown. Present only when sourced from Runtime.exceptionThrown.
            source_url:
              type: string
              description: URL of the script file that threw the exception. Present only when sourced from Runtime.exceptionThrown.
    BrowserConsoleErrorEvent:
      type: object
      description: >
        A browser console error or uncaught JavaScript exception event. Emitted
        from two distinct CDP sources with different data shapes.
        Runtime.consoleAPICalled (console.error calls) produces level, text,
        args, and stack_trace. Runtime.exceptionThrown (uncaught exceptions)
        produces text, line, column, source_url, and stack_trace. Fields not
        applicable to the source are absent.
      required: [ts, type, category, source]
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: console_error
        category:
          type: string
          const: console
        source:
          $ref: "#/components/schemas/BrowserEventSource"
        data:
          $ref: "#/components/schemas/BrowserConsoleErrorEventData"
